# rules.yaml - EDR Agent 탐지 룰 설정
#
# 문법:
#   section_name:
#     - value
#
# 빈 줄과 '#' 으로 시작하는 줄은 무시된다.
# 알 수 없는 섹션은 건너뛴다.
#
# 이 파일을 수정한 뒤 --rules 옵션으로 edr-agent에 전달하면
# 재컴파일 없이 룰을 갱신할 수 있다.
#
# 사용:
#   sudo ./edr-agent --rules config/rules.yaml

# ── R-001: 시스템 경로 파일 수정 ──────────────────────────────────────────
sensitive_paths:
  - /etc/
  - /boot/
  - /bin/
  - /sbin/
  - /usr/bin/
  - /usr/sbin/
  - /lib/
  - /lib64/
  - /usr/lib/

# ── R-002: 로그 파일 삭제 ─────────────────────────────────────────────────
log_paths:
  - /var/log/
  - /run/log/

# ── R-003: 임시 경로 실행 ─────────────────────────────────────────────────
tmp_exec_paths:
  - /tmp/
  - /dev/shm/
  - /run/shm/
  - /var/tmp/

# ── R-004: 공격 도구 ──────────────────────────────────────────────────────
shell_tools:
  - nc
  - ncat
  - netcat
  - socat
  - nmap
  - masscan
  - msfconsole
  - msfvenom
  - empire
  - covenant

# ── R-005/R-008/R-010: 스크립트 인터프리터 ───────────────────────────────
interpreters:
  - python
  - python2
  - python3
  - perl
  - ruby
  - php
  - lua
  - node
  - nodejs

# ── R-011/R-012: 유닉스 셸 ────────────────────────────────────────────────
shells:
  - bash
  - sh
  - dash
  - zsh
  - ksh
  - fish
  - tcsh
  - csh

# ── R-011: 웹 서버 목록 ───────────────────────────────────────────────────
web_servers:
  - nginx
  - apache
  - apache2
  - httpd
  - lighttpd
  - caddy
  - traefik
  - gunicorn
  - uwsgi
  - php-fpm

# ── R-012: DB 서버 목록 ───────────────────────────────────────────────────
db_servers:
  - mysqld
  - mysqld_safe
  - mariadbd
  - postgres
  - postmaster
  - mongod
  - redis-server
  - memcached

# ── R-005/R-008 FP 억제: 패키지 관리자 ───────────────────────────────────
pkg_manager_comms:
  - apt
  - apt-get
  - dpkg
  - dpkg-preconfig
  - pip
  - pip3
  - npm
  - yarn
  - pnpm
  - cargo
  - rustc
  - make
  - cmake
  - ninja
  - gradle
  - mvn

# ── R-007 화이트리스트: 합법적 바인드 프로세스 ───────────────────────────
bind_whitelist:
  - systemd
  - systemd-resolve
  - dbus-daemon
  - NetworkManage
  - avahi-daemon
  - cupsd
  - cups-browsed
  - rsyslogd
  - journald
  - snapd
  - sshd
  - dockerd
  - containerd
  - containerd-shi
  - libvirtd
  - virtlogd
  - nginx
  - apache
  - apache2
  - httpd
  - lighttpd
  - gunicorn
  - uwsgi
  - php-fpm
  - mysqld
  - mysqld_safe
  - mariadbd
  - postgres
  - postmaster
  - mongod
  - redis-server
  - memcached

# ── R-001 화이트리스트: 패키지 관리자 시스템 쓰기 ────────────────────────
sys_write_whitelist:
  - dpkg
  - dpkg-unpack
  - dpkg-preconfig
  - apt
  - apt-get
  - update-alterna
  - rpm
  - yum
  - dnf
  - zypper
  - snap
  - snapd

# ── R-006 화이트리스트: 비표준 포트 허용 ─────────────────────────────────
outbound_whitelist:
  - apt
  - apt-get
  - apt-transport
  - curl
  - wget
  - git
  - git-remote-http
  - snap
  - snapd

# ── R-015 화이트리스트: 알려진 setuid 바이너리 ───────────────────────────
setuid_whitelist:
  - sudo
  - su
  - newgrp
  - passwd
  - chsh
  - chfn
  - chage
  - gpasswd
  - ping
  - ping6
  - traceroute6
  - pkexec
  - crontab
  - at
  - mount
  - umount
  - fusermount
  - fusermount3
  - ssh
  - ssh-agent

# ── R-014 화이트리스트: 합법적 디버거/프로파일러 ─────────────────────────
ptrace_whitelist:
  - gdb
  - lldb
  - strace
  - ltrace
  - perf
  - valgrind
  - rr

# ── R-017 화이트리스트: memfd_create 허용 런타임 ─────────────────────────
memfd_whitelist:
  - java
  - node
  - nodejs
  - chrome
  - qemu-system-x86
  - qemu-system-arm
  - qemu-kvm
  - systemd
  - firefox
  - chromium
  - chromium-browse
  - Xwayland

# ── R-018 화이트리스트: DNS 허용 프로세스 ────────────────────────────────
dns_whitelist:
  - systemd-resolve
  - avahi-daemon

# ── R-024 화이트리스트: 네임스페이스 분리 허용 프로세스 ──────────────────
ns_escape_whitelist:
  - newuidmap
  - newgidmap
  - unshare
  - systemd-nspawn
  - bwrap
  - lxc-start
  - lxc-unshare
  - podman
  - docker

# ── R-018c: 남용 TLD 목록 ────────────────────────────────────────────────
abused_tlds:
  - .tk
  - .ml
  - .ga
  - .cf
  - .gq
  - .xyz
  - .top
  - .work
  - .click

# ── R-006: 일반 포트 목록 ────────────────────────────────────────────────
common_ports:
  - 21
  - 22
  - 25
  - 53
  - 80
  - 110
  - 143
  - 443
  - 465
  - 587
  - 993
  - 995
  - 1433
  - 3306
  - 5432
  - 6379
  - 27017
  - 8080
  - 8443
  - 8888
  - 9200
  - 3000
  - 4200
  - 5000
  - 5173
  - 8000
  - 9090
  - 9100
  - 6443
  - 10250
  - 2375
  - 2376

# ── 위협 인텔리전스 설정 (R-025/R-026/R-027) ─────────────────────────────
# 스칼라 값: "key: value" 형식 (목록이 아님)

# Feodo Tracker C2 IP 블록리스트 (R-025)
ip_feed_url: https://feodotracker.abuse.ch/downloads/ipblocklist.txt

# URLhaus 악성 도메인 피드 (R-026)
domain_feed_url: https://urlhaus.abuse.ch/downloads/text_online/

# 알려진 악성 파일 해시 DB 경로 (R-027, 빈 줄이면 미사용)
hash_db_path: config/known_hashes.txt

# 피드 갱신 주기 (시간, 기본 6)
feed_update_hours: 6
